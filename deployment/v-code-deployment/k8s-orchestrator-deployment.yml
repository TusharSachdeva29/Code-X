# k8s-orchestrator-deployment.yml - Deploys the K8s orchestrator service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-orchestrator
  labels:
    app: k8s-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-orchestrator
  template:
    metadata:
      labels:
        app: k8s-orchestrator
    spec:
      serviceAccountName: k8s-orchestrator-sa
      containers:
        - name: k8s-orchestrator
          image: madmonk29/v-code-k8s:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: CLIENT_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: v-code-config
                  key: CLIENT_ORIGINS
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: v-code-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_CONTAINER_NAME
              valueFrom:
                configMapKeyRef:
                  name: v-code-config
                  key: AZURE_STORAGE_CONTAINER_NAME
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-orchestrator-service
spec:
  selector:
    app: k8s-orchestrator
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
