# nginx-config.yml - Configure nginx to route traffic to V-Code services
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    upstream vcode_backend {
        server v-code-service:80;
    }

    upstream k8s_orchestrator {
        server k8s-orchestrator-service:3002;
    }

    server {
        listen 80;
        server_name _;

        # API routes - proxy to backend
        location /api/ {
            proxy_pass http://vcode_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # K8s orchestrator routes (spawn/delete user containers)
        location /spawn {
            proxy_pass http://k8s_orchestrator/spawn;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /delete {
            proxy_pass http://k8s_orchestrator/delete;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # User container proxy routes (dynamic per-user routing)
        location ~ ^/user/([^/]+)/(.*)$ {
            proxy_pass http://k8s_orchestrator/$1/$2$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # WebSocket routes
        location /socket.io/ {
            proxy_pass http://vcode_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://vcode_backend/health;
        }

        # Frontend static files (if serving from nginx)
        # For now, redirect root to backend
        location / {
            proxy_pass http://vcode_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
